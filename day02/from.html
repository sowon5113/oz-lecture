<!DOCTYPE html>
<html lang="ko">
    <head>
        <title>From 입력 관련 태그</title>
    </head>
    <body>
        <form action="/submit" method="post">
            <input type="text" name="username" placeholder="ID를 입력하세요">
            <input type="password" name="password" placeholder="비밀번호">
            <button type="submit">제출</button>
            <button type="reset">초기화</button>
        </form>
    </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <title>Form 입력 관련 태그</title>
  </head>
  <body>
    <form action="/submit" method="GET">
        <input type="text" name="username" placeholder="사용자이름">
        <input type="password" name="password" placeholder="비밀번호">
        <br>
        <div>
            <h3>취미를 선택해주세요</h3>
            <input type="checkbox" name="hobby" value="reding"> 독서
            <input type="checkbox" name="hobby" value="gameing"> 게임
        </div>
        <div>
            <h3>성별을 선택해주세요</h3>
            <input type="radio" name="gender" value="male"> 남성
            <input type="radio" name="gender" value="famale"> 여성
        </div>
        <br>
        <div>
            <select name="city" multiple>
                <option value="seoul">서울</option>
                <option vlaue="busan">부산</option>
                <option value="jeju">제주</option>
            </select>
        </div>
        <br>
        <button type="submit">제출</button>
        <button type="reset">초기화</button>
    </form>
  </body>
</html>
